rdf-id = { path = "lib/rdf-id" }
rdf-model = { path = "lib/rdf-model" }
rdf-query = { path = "lib/rdf-query" }
rdf-reader = { path = "lib/rdf-reader" }
rdf-reader-cottas = { path = "lib/rdf-reader-cottas" }
rdf-reader-hdt = { path = "lib/rdf-reader-hdt" }
rdf-reader-jsonld = { path = "lib/rdf-reader-jsonld" }
rdf-reader-nquads = { path = "lib/rdf-reader-nquads" }
rdf-reader-ntriples = { path = "lib/rdf-reader-ntriples" }
rdf-reader-rdfxml = { path = "lib/rdf-reader-rdfxml" }
rdf-reader-trig = { path = "lib/rdf-reader-trig" }
rdf-reader-turtle = { path = "lib/rdf-reader-turtle" }
rdf-store = { path = "lib/rdf-store" }
rdf-store-idb = { path = "lib/rdf-store-idb" }
rdf-store-mongo = { path = "lib/rdf-store-mongo" }
rdf-store-neo4j = { path = "lib/rdf-store-neo4j" }
rdf-store-oxigraph = { path = "lib/rdf-store-oxigraph" }
rdf-store-postgres = { path = "lib/rdf-store-postgres" }
rdf-store-qlever = { path = "lib/rdf-store-qlever" }
rdf-store-sqlite = { path = "lib/rdf-store-sqlite" }
rdf-store-turso = { path = "lib/rdf-store-turso" }
rdf-store-valkey = { path = "lib/rdf-store-valkey" }
rdf-store-virtuoso = { path = "lib/rdf-store-virtuoso" }
rdf-stream = { path = "lib/rdf-stream" }
rdf-vocab = { path = "lib/rdf-vocab" }
rdf-writer = { path = "lib/rdf-writer" }
rdf-writer-cottas = { path = "lib/rdf-writer-cottas" }
rdf-writer-hdt = { path = "lib/rdf-writer-hdt" }
rdf-writer-jsonld = { path = "lib/rdf-writer-jsonld" }
rdf-writer-nquads = { path = "lib/rdf-writer-nquads" }
rdf-writer-ntriples = { path = "lib/rdf-writer-ntriples" }
rdf-writer-rdfxml = { path = "lib/rdf-writer-rdfxml" }
rdf-writer-trig = { path = "lib/rdf-writer-trig" }
rdf-writer-turtle = { path = "lib/rdf-writer-turtle" }
xsd = { path = "lib/xsd" }

#sparql-store = { path = "../sparql.rs/lib/sparql-store" }

