# See: https://doc.rust-lang.org/cargo/reference/manifest.html

[workspace]
members = ["bin/*", "lib/*"]
default-members = [
    "lib/rdf_rs",
    "lib/rdf-derive",
    "lib/rdf-format",
    "lib/rdf-hash",
    "lib/rdf-id",
    "lib/rdf-model",
    "lib/rdf-query",
    "lib/rdf-reader",
    "lib/rdf-store",
    "lib/rdf-stream",
    "lib/rdf-vocab",
    "lib/rdf-writer",
    "lib/xsd",
]
resolver = "2"

[workspace.package]
version = "0.4.2"
authors = ["Arto Bendiken"]
edition = "2024"
rust-version = "1.85"
description = "RDF.rs is a Rust framework for working with RDF knowledge graphs."
#documentation = "https://docs.rs/rdf-model"
readme = true
homepage = "https://github.com/rust-rdf"
repository = "https://github.com/rust-rdf/rdf.rs"
license = "Unlicense"
keywords = ["rdf", "knowledge-graph", "linked-data", "semantic-web"]
categories = ["data-structures", "no-std"]
publish = true

[workspace.dependencies]
rdf = { package = "rdf_rs", version = "=0.4.2", default-features = true }
rdf-borsh = { version = "=0.4.2", default-features = true }
rdf-derive = { version = "=0.4.2", default-features = true }
rdf-format = { version = "=0.4.2", default-features = true }
rdf-hash = { version = "=0.4.2", default-features = true }
rdf-id = { version = "=0.4.2", default-features = true }
rdf-model = { version = "=0.4.2", default-features = true }
rdf-query = { version = "=0.4.2", default-features = true }
rdf-reader = { version = "=0.4.2", default-features = true }
rdf-reader-cottas = { version = "=0.4.2", default-features = true }
rdf-reader-hdt = { version = "=0.4.2", default-features = true }
rdf-reader-jsonld = { version = "=0.4.2", default-features = true }
rdf-reader-nquads = { version = "=0.4.2", default-features = true }
rdf-reader-ntriples = { version = "=0.4.2", default-features = true }
rdf-reader-rdfxml = { version = "=0.4.2", default-features = true }
rdf-reader-trig = { version = "=0.4.2", default-features = true }
rdf-reader-turtle = { version = "=0.4.2", default-features = true }
rdf-store = { version = "=0.4.2", default-features = true }
rdf-store-idb = { version = "=0.4.2", default-features = true }
rdf-store-mongo = { version = "=0.4.2", default-features = true }
rdf-store-neo4j = { version = "=0.4.2", default-features = true }
rdf-store-oxigraph = { version = "=0.4.2", default-features = true }
rdf-store-postgres = { version = "=0.4.2", default-features = true }
rdf-store-qlever = { version = "=0.4.2", default-features = true }
rdf-store-sqlite = { version = "=0.4.2", default-features = true }
rdf-store-turso = { version = "=0.4.2", default-features = true }
rdf-store-valkey = { version = "=0.4.2", default-features = true }
rdf-store-virtuoso = { version = "=0.4.2", default-features = true }
rdf-stream = { version = "=0.4.2", default-features = true }
rdf-vocab = { version = "=0.4.2", default-features = true }
rdf-writer = { version = "=0.4.2", default-features = true }
rdf-writer-cottas = { version = "=0.4.2", default-features = true }
rdf-writer-hdt = { version = "=0.4.2", default-features = true }
rdf-writer-jsonld = { version = "=0.4.2", default-features = true }
rdf-writer-nquads = { version = "=0.4.2", default-features = true }
rdf-writer-ntriples = { version = "=0.4.2", default-features = true }
rdf-writer-rdfxml = { version = "=0.4.2", default-features = true }
rdf-writer-trig = { version = "=0.4.2", default-features = true }
rdf-writer-turtle = { version = "=0.4.2", default-features = true }
xsd = { version = "=0.4.2", default-features = true }

# Interoperability:
borsh = { version = "1.6", default-features = false, features = ["derive"] }
bson = { version = "3.1", default-features = false, features = ["compat-3-0-0"] }
dogma = { version = "0.1", default-features = false, features = ["traits"] }
json-ld = { version = "0.21", default-features = false }
rdf-fusion = { version = "0.1", default-features = false }
rudof = { version = "0.1", default-features = false }
serde = { version = "1", default-features = false, features = ["derive"] }
serde_json = { version = "1", default-features = false, features = ["preserve_order"] }

# Interoperability with SPARQL.rs:
sparql-store = { version = "0", default-features = false, features = ["alloc"] }

# Interoperability with Oxigraph:
oxigraph = { version = "0.5.9", default-features = false, features = ["rdf-12"] }
oxjsonld = { version = "0.2", default-features = false, features = ["async-tokio", "rdf-12"] }
oxrdf = { version = "0.3", default-features = false, features = ["rdf-12"] }
oxrdfio = { version = "0.2", default-features = false, features = ["rdf-12"] }
oxrdfxml = { version = "0.2", default-features = false, features = ["async-tokio", "rdf-12"] }
oxsdatatypes = { version = "0.2", default-features = false }
oxttl = { version = "0.2", default-features = false, features = ["async-tokio", "rdf-12"] }
sparesults = { version = "0.3", default-features = false, features = ["sparql-12"] }
spareval = { version = "0.2", default-features = false, features = ["sparql-12"] }
spargebra = { version = "0.4", default-features = false, features = ["sparql-12"] }
sparopt = { version = "0.3", default-features = false, features = ["sparql-12"] }

# Interoperability with Sophia:
sophia = { version = "0.10", default-features = false }
sophia_jsonld = { version = "0.10", default-features = false }
sophia_turtle = { version = "0.10", default-features = false }

# Implementation:
arrayvec = { version = "0.7", default-features = false }
arrow-array = { version = "59.0", default-features = false }
arrow-schema = { version = "59.0", default-features = false }
async-stream = "0.3"
bytes = { version = "1.11", default-features = false }
decorum = { version = "0.4", default-features = false }
derive_more = { version = "2", default-features = false }
float-ord = { version = "0.3", default-features = false }
futures = "0.3"
futures-util = "0.3"
heapless = { version = "0.9", default-features = false }
hex = { version = "0.4", default-features = false }
itertools = { version = "0.14", default-features = false }
known-languages = { version = "0.0", default-features = false }
num-traits = { version = "0.2", default-features = false }
num-integer = { version = "0.1", default-features = false }
ouroboros = { version = "0.18", default-features = false }
parking_lot = { version = "0.12", default-features = false }
parquet = { version = "59.0", default-features = false, features = ["async"] }
#polars = { version = "0.54", default-features = false, features = ["lazy"] }
send_wrapper = { version = "0.6", default-features = false, features = ["futures"] }
tempfile = { version = "3.15", default-features = false }
thiserror = { version = "2", default-features = false }
zeroize = { version = "1.8", default-features = false }

# Development:
aquamarine = { version = "0.6", default-features = false }
instability = "0.3"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tokio-stream = { version = "0.1", default-features = false }
tokio-util = { version = "0.7", default-features = false }

[patch.crates-io]
rdf-cli = { path = "bin/rdf" }
rdf_rs = { path = "lib/rdf_rs" }
rdf-borsh = { path = "lib/rdf-borsh" }
rdf-derive = { path = "lib/rdf-derive" }
rdf-format = { path = "lib/rdf-format" }
