[package]
name = "rdf_rs"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description.workspace = true
#documentation.workspace = true
readme.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
publish.workspace = true

[features]
default = ["all", "std"]
all = ["oxrdf", "serde"]
alloc = [
    "rdf-derive/alloc",
    "rdf-format/alloc",
    "rdf-hash/alloc",
    "rdf-id/alloc",
    "rdf-model/alloc",
    "rdf-query/alloc",
    "rdf-reader/alloc",
    "rdf-store/alloc",
    "rdf-stream/alloc",
    "rdf-vocab/alloc",
    "rdf-writer/alloc",
]
std = [
    "alloc",
    "rdf-derive/std",
    "rdf-format/std",
    "rdf-hash/std",
    "rdf-id/std",
    "rdf-model/std",
    "rdf-query/std",
    "rdf-reader/std",
    "rdf-store/std",
    "rdf-stream/std",
    "rdf-vocab/std",
    "rdf-writer/std",
]
unstable = [
    "rdf-derive/unstable",
    "rdf-format/unstable",
    "rdf-hash/unstable",
    "rdf-id/unstable",
    "rdf-model/unstable",
    "rdf-query/unstable",
    "rdf-reader/unstable",
    "rdf-store/unstable",
    "rdf-stream/unstable",
    "rdf-vocab/unstable",
    "rdf-writer/unstable",
]

# Integrations:
borsh = [
    "rdf-model/borsh",
]
oxrdf = [
    "rdf-format/oxrdf",
    "rdf-model/oxrdf",
    "rdf-reader/oxrdf",
    "rdf-writer/oxrdf",
]
serde = [
    "rdf-format/serde",
    "rdf-model/serde",
    "rdf-reader/serde",
    "rdf-writer/serde",
]
sophia = [
    "rdf-format/sophia",
    "rdf-model/sophia",
    "rdf-reader/sophia",
    "rdf-writer/sophia",
]

[dependencies]
rdf-derive.workspace = true
rdf-format.workspace = true
rdf-hash.workspace = true
rdf-id.workspace = true
rdf-model.workspace = true
rdf-query.workspace = true
rdf-reader.workspace = true
rdf-store.workspace = true
rdf-stream.workspace = true
rdf-vocab.workspace = true
rdf-writer.workspace = true

[dev-dependencies]
tokio.workspace = true
