[package]
name = "rdf-writer"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description.workspace = true
#documentation.workspace = true
readme.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
publish.workspace = true

[features]
default = ["all", "std"]
all = ["rdf-star", "serde"]
alloc = ["rdf-format/alloc", "rdf-model/alloc"]
std = ["alloc", "rdf-format/alloc", "rdf-model/std"]
unstable = []

# Features:
rdf-star = ["oxrdfio?/rdf-12", "rdf-format/rdf-star", "rdf-model/rdf-star"]

# Integrations:
oxrdf = ["rdf-model/oxrdf", "dep:oxrdfio"]
serde = ["rdf-model/serde"]
sophia = ["rdf-model/sophia", "dep:sophia"]

[dependencies]
rdf-format.workspace = true
rdf-model.workspace = true
instability.workspace = true

# Integrations:
oxrdfio = { workspace = true, optional = true }
sophia = { workspace = true, optional = true }

[dev-dependencies]
tokio.workspace = true
