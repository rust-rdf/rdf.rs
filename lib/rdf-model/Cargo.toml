[package]
name = "rdf-model"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description.workspace = true
#documentation.workspace = true
readme.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
publish.workspace = true

[features]
default = ["all", "std"]
all = ["rdf-star", "serde", "oxrdf"]
alloc = ["xsd/alloc"]
std = ["alloc", "dogma/std", "serde?/std", "xsd/std"]
unstable = []

# Features:
rdf-star = ["oxrdf?/rdf-12"]

# Integrations:
borsh = ["dep:borsh", "xsd/borsh"]
oxrdf = ["dep:oxrdf"]
serde = ["dep:serde", "dep:serde_json", "xsd/serde"]
sophia = ["dep:sophia"]

[dependencies]
dogma.workspace = true
instability.workspace = true
xsd = { workspace = true, features = ["datetime", "decimal"] }

# Integrations:
borsh = { workspace = true, optional = true }
oxrdf = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
sophia = { workspace = true, optional = true }

[dev-dependencies]
tokio.workspace = true
