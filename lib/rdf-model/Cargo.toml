[package]
name = "rdf-model"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description.workspace = true
#documentation.workspace = true
readme.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
publish.workspace = true

[features]
default = ["all", "std"]
all = ["rdf-star", "serde"]
alloc = []
std = ["alloc", "dogma/std", "serde?/std"]
unstable = []

# Features:
rdf-star = ["oxrdf?/rdf-star"]

# Integrations:
borsh = ["dep:borsh"]
oxrdf = ["dep:oxrdf"]
serde = ["dep:serde"]
sophia = ["dep:sophia"]

[dependencies]
borsh = { workspace = true, optional = true }
dogma.workspace = true
oxrdf = { version = "0.2", default-features = false, optional = true }
serde = { workspace = true, optional = true }
sophia = { version = "0.9", default-features = false, optional = true }
stability = "0.2"
xsd = { workspace = true, features = ["alloc", "datetime", "decimal"] }
