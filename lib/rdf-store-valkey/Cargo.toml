[package]
name = "rdf-store-valkey"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description.workspace = true
#documentation.workspace = true
readme.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
publish.workspace = true

[features]
default = ["all", "std"]
all = ["tokio"]
alloc = ["itertools/use_alloc", "rdf-model/alloc"]
std = ["alloc", "rdf-model/std", "rdf-store/std"]
unstable = []

# Features:
tls = ["redis/tokio-rustls-comp"]
tokio = ["redis/tokio-comp"]

[dependencies]
async-stream.workspace = true
async-trait.workspace = true
derive_more = { workspace = true, features = ["debug"] }
futures.workspace = true
itertools.workspace = true
rdf-model = { workspace = true, features = ["serde"] }
rdf-store.workspace = true
redis = { version = "1", default-features = false, features = ["aio", "json"] }
serde_json.workspace = true
thiserror.workspace = true
xsd.workspace = true

[dev-dependencies]
tokio.workspace = true
