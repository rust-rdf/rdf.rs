[package]
name = "xsd"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "XSD.rs"
#documentation = "https://docs.rs/xsd/"
readme = "README.md"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords = ["xml", "schema", "xsd"]
categories.workspace = true
publish.workspace = true

[features]
default = ["all", "std"]
all = ["datetime", "decimal"]
alloc = []
std = ["alloc"]
unstable = []

# Features:
datetime = ["jiff"]
decimal = ["rust_decimal"]

# Integrations:
jiff = ["dep:jiff"]
rust_decimal = ["dep:rust_decimal"]

[dependencies]
decorum = { workspace = true, features = ["serde"] }
phf = { version = "0.13", default-features = false, features = ["macros"] }
strum = "0.28"
strum_macros = "0.28"

# Integrations:
borsh = { workspace = true, optional = true }
jiff = { version = "0.2", default-features = false, features = ["serde"], optional = true }
rust_decimal = { version = "1.42", default-features = false, features = ["serde-with-str"], optional = true }
serde = { workspace = true, optional = true }
