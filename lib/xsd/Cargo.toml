[package]
name = "xsd"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "XSD.rs"
#documentation = "https://docs.rs/xsd/"
readme = "README.md"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords = ["xml", "schema", "xsd"]
categories.workspace = true
publish.workspace = true

[features]
default = ["all", "std"]
all = []
std = []
unstable = []

[dependencies]
float-ord.workspace = true
jiff = { version = "0.2", default-features = false }
phf = { version = "0.13", default-features = false, features = ["macros"] }
rust_decimal = { version = "1.42", default-features = false }
strum = "0.28"
strum_macros = "0.28"
