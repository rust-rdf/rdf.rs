[package]
name = "xsd"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "XSD.rs"
#documentation = "https://docs.rs/xsd"
readme = "README.md"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords = ["xml", "xsd", "rdf", "semantic-web"]
categories.workspace = true
publish.workspace = true

[features]
default = ["all", "std"]
all = ["datetime", "decimal"]
alloc = ["heapless/alloc"]
std = ["alloc"]
unstable = []

# Features:
datetime = ["jiff"]
decimal = ["rust_decimal"]

# Integrations:
bson = ["dep:bson"]
datafusion = ["dep:rdf-fusion"]
jiff = ["dep:jiff"]
json-ld = []
oxrdf = ["dep:oxrdf", "dep:oxsdatatypes"]
rudof = ["dep:oxsdatatypes"]
rust_decimal = ["dep:rust_decimal"]
serde = ["dep:serde", "dep:serde_json"]
sophia = []

[dependencies]
decorum = { workspace = true, features = ["serde"] }
dogma.workspace = true
heapless.workspace = true
phf = { version = "0.13", default-features = false, features = ["macros"] }
strum = "0.28"
strum_macros = "0.28"

# Integrations:
borsh = { workspace = true, optional = true }
bson = { workspace = true, optional = true }
jiff = { version = "0.2", default-features = false, features = ["serde"], optional = true }
oxrdf = { workspace = true, optional = true }
oxsdatatypes = { workspace = true, optional = true }
rdf-fusion = { workspace = true, optional = true }
rust_decimal = { version = "1.42", default-features = false, features = ["borsh", "serde-with-str"], optional = true }
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
