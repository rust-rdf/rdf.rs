[package]
name = "xsd"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "XSD.rs"
#documentation = "https://docs.rs/xsd"
readme = "README.md"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords = ["xml", "xsd", "rdf", "semantic-web"]
categories.workspace = true
publish.workspace = true

[features]
default = ["all", "std"]
all = ["datetime", "decimal"]
alloc = ["heapless/alloc", "valuand/alloc"]
std = ["alloc", "valuand/std"]
unstable = []

# Features:
datetime = ["jiff"]
decimal = ["valuand/decimal"]

# Interoperability:
borsh = ["dep:borsh", "valuand/borsh"]
bson = ["dep:bson", "valuand/bson"]
#datafusion = ["dep:rdf-fusion"]
jiff = ["dep:jiff"]
json-ld = []
oxrdf = ["dep:oxrdf", "dep:oxsdatatypes"]
rudof = ["dep:oxsdatatypes"]
rust_decimal = ["dep:rust_decimal", "valuand/rust_decimal"]
serde = ["dep:serde", "dep:serde_json", "decorum/serde", "valuand/serde", "jiff?/serde", "rust_decimal?/serde-with-str"]
sophia = []

[dependencies]
decorum.workspace = true
dogma.workspace = true
heapless.workspace = true
phf = { version = "0.14", default-features = false, features = ["macros"] }
strum = "0.28"
strum_macros = "0.28"
valuand = { workspace = true, features = ["number"] }

# Interoperability:
borsh = { workspace = true, optional = true }
bson = { workspace = true, optional = true }
jiff = { version = "0.2", default-features = false, optional = true }
oxrdf = { workspace = true, optional = true }
oxsdatatypes = { workspace = true, optional = true }
#rdf-fusion = { workspace = true, optional = true }
rust_decimal = { version = "1.42", default-features = false, optional = true }
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }

# Preview locally with: RUSTDOCFLAGS="--cfg docsrs" cargo +nightly doc --all-features
[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
